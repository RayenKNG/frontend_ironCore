name: ironcore_gym_store
description: IronCore Gym Store — Marketplace App UTS Mobile Application Development
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  firebase_messaging: ^14.7.10
  cloud_firestore: ^4.14.0

  # Google Sign In
  google_sign_in: ^6.2.1

  # Local Notifications (for FCM foreground display)
  flutter_local_notifications: ^16.3.2

  # State Management
  provider: ^6.1.1

  # UI & Utils
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  # Custom fonts (optional — download from Google Fonts)
  # fonts:
  #   - family: DmSans
  #     fonts:
  #       - asset: assets/fonts/DMSans-Regular.ttf
  #       - asset: assets/fonts/DMSans-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/DMSans-Bold.ttf
  #         weight: 700

  assets:
    - assets/images/
